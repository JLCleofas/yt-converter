services:
  yt-mp3:
    build:
      context: .
      dockerfile: Dockerfile
    image: yt-mp3:latest
    container_name: yt-mp3

    restart: unless-stopped

    ports:
      - "${HOST_PORT:-8000}:8000"

    volumes:
      - tmp_data:/tmp/yt-mp3

    environment:
      - MAX_CONCURRENT_JOBS=${MAX_CONCURRENT_JOBS:-3}
      - FILE_TTL_SECONDS=${FILE_TTL_SECONDS:-600}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - TMP_DIR=/tmp/yt-mp3

    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/docs"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3

    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

    deploy:
      resources:
        limits:
          cpus: "2.0"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 128M

volumes:
  tmp_data:
    driver: local